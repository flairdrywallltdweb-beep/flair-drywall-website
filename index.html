    <meta name="theme-color" content="#1E3A5F" />

    <!--
    ══════════════════════════════════════════════════════════════
     PRIMARY SEO
     Title format: Primary Keyword | Brand | Location (≤60 chars)
     Target keywords: drywall contractor Alberta, drywall installation
     Calgary/Edmonton, insulation spray foam Alberta
    ══════════════════════════════════════════════════════════════
    -->
    <title>Drywall Contractor in Alberta | Flair Drywall Ltd</title>
    <meta name="description" content="Flair Drywall Ltd provides professional drywall installation, insulation, spray foam, mud taping, and texture finishing across Alberta. Contact us for a free estimate." />
    <link rel="canonical" href="https://flairdrywallltd.ca/" />

    <!-- Secondary keywords / topic signals -->
    <meta name="keywords" content="drywall contractor Alberta, drywall installation Calgary, drywall Edmonton, insulation contractor Alberta, spray foam insulation Alberta, mud taping Alberta, texture finishing drywall, drywall company Alberta, residential drywall Alberta, commercial drywall Alberta, Flair Drywall" />

    <!-- Geographic targeting -->
    <meta name="geo.region" content="CA-AB" />

    <!-- Author / business -->
    <meta name="author" content="Flair Drywall Ltd" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <!--
    ══════════════════════════════════════════════════════════════
     OPEN GRAPH — Facebook / LinkedIn / WhatsApp previews
    ══════════════════════════════════════════════════════════════
    -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://flairdrywallltd.ca/" />
    <meta property="og:site_name"   content="Flair Drywall Ltd" />

    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"   content="Flair Drywall Ltd — Drywall Contractor in Alberta" />
    <meta property="og:locale"      content="en_CA" />

    ══════════════════════════════════════════════════════════════

    <!--
    ══════════════════════════════════════════════════════════════
     GOOGLE FONTS — Preconnect FIRST, then load

    ══════════════════════════════════════════════════════════════
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Cardo:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&family=Oswald:wght@700&display=swap"
    />

      rel="stylesheet"
    />

    <!--
    ══════════════════════════════════════════════════════════════
     STRUCTURED DATA (JSON-LD)
     Schema: HomeAndConstructionBusiness — more specific than
     LocalBusiness; signals to Google this is a contractor,
     qualifies for richer local pack results.

     TODO when client provides info:
       - Add "telephone" field with real phone number
       - Add "address.streetAddress" and "postalCode"
       - Add "openingHoursSpecification" with real hours
       - Add "aggregateRating" once Google Reviews are set up
       - Add "hasMap" with Google Maps link
    ══════════════════════════════════════════════════════════════
    -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "HomeAndConstructionBusiness",
      "@id": "https://flairdrywallltd.ca/#business",
      "name": "Flair Drywall Ltd",
      "alternateName": "Flair Drywall",
      "url": "https://flairdrywallltd.ca/",
      "logo": "https://flairdrywallltd.ca/Logo-removebg-preview.png",
      "image": "https://flairdrywallltd.ca/drywall-2.jpg",
      "description": "Flair Drywall Ltd provides professional drywall installation, insulation, spray foam, mud taping, and texture finishing services across Alberta, Canada.",
      "email": "flairdrywallltd62@gmail.com",
      "address": {
        "@type": "PostalAddress",
        "addressRegion": "AB",
        "addressCountry": "CA"
      },
      "areaServed": [
        {
          "@type": "State",
          "name": "Alberta",
          "sameAs": "https://www.wikidata.org/wiki/Q1951"
        }
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Drywall Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Drywall Installation", "description": "Professional drywall installation for residential and commercial projects across Alberta." } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Insulation",           "description": "Energy-efficient insulation solutions for Alberta homes and businesses." } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Spray Foam Insulation","description": "High-performance spray foam insulation for airtight, moisture-resistant walls and attics." } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Mud Taping",           "description": "Expert taping and mudding for smooth, crack-free wall finishes." } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Texture Finishing",    "description": "Professional texture finishes including orange peel, knockdown, and smooth skim coat." } }
        ]
      },
      "sameAs": []
    }
    </script>
